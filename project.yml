name: Drip
options:
  bundleIdPrefix: com.akshaykailat
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_PREVIEWS: "YES"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.akshaykailat.drip

targets:
  Drip:
    type: application
    platform: iOS
    sources:
      - path: Drip
    info:
      path: Drip/Resources/Info.plist
      properties:
        CFBundleDisplayName: Drip
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        NSUserNotificationUsageDescription: "Drip sends daily workout reminders to keep your streak alive."
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        INFOPLIST_FILE: Drip/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
    dependencies: []
    capabilities:
      push-notifications: {}
      background-modes:
        modes:
          - background-fetch

  DripTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DripTests
    dependencies:
      - target: Drip
    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Drip.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Drip"

schemes:
  Drip:
    build:
      targets:
        Drip: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - DripTests
    archive:
      config: Release
